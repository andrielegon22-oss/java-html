<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div { 
            padding: 20px;
            margin-top: 50px;
            width: 300px;
            border: solid 1px red;
        }

        p {
            color: chocolate
        }
    </style>
</head>

<body>

    <h1>Inteiração Javascript x HTML</h1>

    <label for="nome">Nome</label>
    <input type="text" id="nome">

    <button onclick="validarUsuario">Validar usuário</button>


    <div id="validação">
        aguardando validação ...
    </div>
    <script>

        function validarUsuario() {
            // Interação Javascript buscando dados HTML 
            const inpputNome = document.getElementById('nome')
            const nome = inpputNome.value

            // Interação Javascript enviando dados para o HTML 
            const divValidacao = document.getElementById('validacao')
            // divValidacao.innerHTML = '<p>Olá ' + nome + ', seja bem vindo ao sistema!'
            divValidacao.innerHTML += '
                <p>Olá ${nome}, seja bem vindo ao sistema!</p>
                '

            inpputNome.value = ''
            inpputNome, focus()
        }


    </script>

</body>

</html>
